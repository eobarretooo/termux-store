<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4e8838" />
      <stop offset="100%" stop-color="#76b05c" />
    </linearGradient>
  </defs>
  
  <!-- Background with modern rounded corners -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGrad)" />
  
  <!-- Terminal screen area -->
  <rect x="8" y="8" width="48" height="48" rx="8" fill="#1e1e1e" />
  
  <!-- Terminal window header buttons -->
  <circle cx="15" cy="15" r="2" fill="#ff5f56" />
  <circle cx="21" cy="15" r="2" fill="#ffbd2e" />
  <circle cx="27" cy="15" r="2" fill="#27c93f" />
  
  <!-- Shell prompt symbol: > -->
  <path d="M 16 26 L 22 30 L 16 34" stroke="#76b05c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Download arrow and installer tray -->
  <path d="M 38 24 L 38 40 M 32 34 L 38 40 L 44 34" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M 30 46 L 46 46" stroke="#76b05c" stroke-width="2.5" stroke-linecap="round" fill="none" />
</svg>
